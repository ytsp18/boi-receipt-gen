<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co; img-src 'self' data: blob: https://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'">
    <title>FTS Internal — เมนูหลัก</title>
    <link rel="stylesheet" href="css/style.css?v=9.4.0">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f5f7fa;
            font-family: 'Sarabun', sans-serif;
            margin: 0;
        }

        /* Header */
        .landing-header {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .landing-header h1 {
            font-size: 1.3rem;
            margin: 0;
            font-weight: 600;
        }
        .landing-header .subtitle {
            font-size: 0.85rem;
            opacity: 0.85;
            margin: 2px 0 0;
        }
        .landing-header .user-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .landing-header .user-name {
            font-weight: 500;
        }
        .landing-header .user-role {
            font-size: 0.75rem;
            background: rgba(255,255,255,0.2);
            padding: 2px 10px;
            border-radius: 10px;
        }
        .btn-logout {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .btn-logout:hover {
            background: rgba(255,255,255,0.25);
        }

        /* Module Grid */
        .landing-main {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px;
        }

        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            max-width: 900px;
            width: 100%;
        }

        /* Module Card */
        .module-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 28px 24px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .module-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            border-color: #2563eb;
        }

        .module-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .module-card .card-icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
        }

        .module-card .card-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: #1e3a5f;
            margin: 0 0 8px;
        }

        .module-card .card-desc {
            font-size: 0.85rem;
            color: #6b7280;
            line-height: 1.5;
            margin: 0;
        }

        .module-card .card-badge {
            display: inline-block;
            margin-top: 12px;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.72rem;
            font-weight: 600;
        }

        .module-card .card-badge.coming-soon {
            background: #fef3c7;
            color: #92400e;
        }

        /* Footer */
        .landing-footer {
            text-align: center;
            padding: 16px;
            color: #aaa;
            font-size: 0.8rem;
        }

        /* Env Badge */
        .env-badge {
            position: fixed;
            bottom: 8px;
            right: 8px;
            background: #ef4444;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .landing-header {
                padding: 12px 16px;
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }
            .module-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="landing-header">
        <div>
            <h1>🏢 FTS Internal</h1>
            <p class="subtitle" id="branchNameHeader">กำลังโหลด...</p>
        </div>
        <div class="user-section">
            <div>
                <span class="user-name" id="userName">-</span>
                <span class="user-role" id="userRole">-</span>
            </div>
            <button class="btn-logout" data-action="logout">🚪 ออกจากระบบ</button>
        </div>
    </header>

    <main class="landing-main">
        <div class="module-grid" id="moduleGrid">
            <!-- Cards will be rendered by JS based on permissions -->
            <div style="grid-column: 1 / -1; text-align:center; color:#6b7280; padding:40px 0;">
                กำลังโหลดเมนู...
            </div>
        </div>
    </main>

    <footer class="landing-footer">
        <span>FTS Internal Platform v9.1.0</span>
    </footer>

    <div class="env-badge" id="envBadge" style="display:none;">SIT ENV</div>

    <!-- Version Badge -->
    <div class="version-badge">v9.3.0</div>

    <!-- Supabase Library + Auth Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.95.3" integrity="sha384-aRAaCbKYByQpx0fjPuC0PQ9P9moWMEsHXP9tyzP7tbyD5fPK6oTp+THsxdWiq02L" crossorigin="anonymous"></script>
    <script src="js/supabase-config.js?v=9.4.0"></script>
    <script src="js/auth.js?v=9.4.0"></script>
    <script src="js/landing-app.js?v=9.4.0"></script>
</body>
</html>
