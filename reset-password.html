<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co; img-src 'self' data: blob: https://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'">
    <title>ตั้งรหัสผ่านใหม่ - ระบบสร้างแบบฟอร์มรับบัตร EWP</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }

        .reset-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .reset-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .reset-header h1 {
            color: #2563eb;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .reset-header p {
            color: #6b7280;
            font-size: 0.9rem;
        }

        .reset-form .form-group {
            margin-bottom: 20px;
        }

        .reset-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
        }

        .reset-form input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .reset-form input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .reset-btn {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .reset-btn:hover {
            background: #1d4ed8;
        }

        .reset-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .reset-error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .reset-error.show {
            display: block;
        }

        .reset-success {
            background: #d1fae5;
            color: #059669;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .reset-success.show {
            display: block;
        }

        .reset-footer {
            text-align: center;
            margin-top: 20px;
            color: #9ca3af;
            font-size: 0.8rem;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #2563eb;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-header">
            <h1>🔑 ตั้งรหัสผ่านใหม่</h1>
            <p>กรุณากรอกรหัสผ่านใหม่ของคุณ</p>
        </div>

        <div class="reset-error" id="resetError">
            เกิดข้อผิดพลาด
        </div>

        <div class="reset-success" id="resetSuccess">
            เปลี่ยนรหัสผ่านสำเร็จ!
        </div>

        <form class="reset-form" id="resetForm">
            <div class="form-group">
                <label for="newPassword">รหัสผ่านใหม่</label>
                <input type="password" id="newPassword" placeholder="อย่างน้อย 8 ตัวอักษร (A-Z, 0-9)" required minlength="8">
            </div>

            <div class="form-group">
                <label for="confirmPassword">ยืนยันรหัสผ่านใหม่</label>
                <input type="password" id="confirmPassword" placeholder="กรอกรหัสผ่านอีกครั้ง" required minlength="8">
            </div>

            <button type="submit" class="reset-btn" id="submitBtn">บันทึกรหัสผ่านใหม่</button>
        </form>

        <a href="login.html" class="back-link" id="backToLogin">← กลับไปหน้าเข้าสู่ระบบ</a>

        <div class="reset-footer">
            <p>© 2026 EWP Service Center, One Bangkok Building</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.95.3" integrity="sha384-aRAaCbKYByQpx0fjPuC0PQ9P9moWMEsHXP9tyzP7tbyD5fPK6oTp+THsxdWiq02L" crossorigin="anonymous"></script>
    <script src="js/supabase-config.js?v=9.3.0"></script>
    <script src="js/auth.js?v=9.3.0"></script>
    <script src="js/reset-password-app.js?v=9.3.0"></script>
</body>
</html>
