<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co; img-src 'self' data: blob: https://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'">
    <title>เข้าสู่ระบบ - ระบบสร้างแบบฟอร์มรับบัตร EWP</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #2563eb;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #6b7280;
            font-size: 0.9rem;
        }

        .login-form .form-group {
            margin-bottom: 20px;
        }

        .login-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
        }

        .login-form input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .login-form input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: #1d4ed8;
        }

        .login-error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            color: #9ca3af;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🔐 เข้าสู่ระบบ</h1>
            <p>ระบบสร้างแบบฟอร์มการรับบัตร BOI</p>
            <p style="font-size: 0.8rem; margin-top: 4px;">ศูนย์บริการ EWP</p>
        </div>

        <div class="login-error" id="loginError">
            ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง
        </div>

        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label for="email">อีเมล (Email)</label>
                <input type="email" id="email" placeholder="กรอกอีเมล" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">รหัสผ่าน (Password)</label>
                <input type="password" id="password" placeholder="กรอกรหัสผ่าน" required autocomplete="current-password">
            </div>

            <button type="submit" class="login-btn">เข้าสู่ระบบ</button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <p style="color: #6b7280; font-size: 0.9rem;">ยังไม่มีบัญชี?</p>
            <button type="button" class="register-btn" id="showRegisterBtn" style="
                background: transparent;
                border: 2px solid #2563eb;
                color: #2563eb;
                padding: 10px 20px;
                border-radius: 8px;
                font-size: 0.9rem;
                font-weight: 500;
                cursor: pointer;
                margin-top: 8px;
                transition: all 0.2s;
            ">📝 สมัครใช้งาน</button>
        </div>

        <!-- Register Modal -->
        <div id="registerModal" style="
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        ">
            <div style="
                background: white;
                padding: 30px;
                border-radius: 16px;
                width: 100%;
                max-width: 400px;
                margin: 20px;
            ">
                <h2 style="text-align: center; color: #2563eb; margin-bottom: 20px;">📝 สมัครใช้งาน</h2>
                <form id="registerForm">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">อีเมล (Email)</label>
                        <input type="email" id="regEmail" placeholder="example@email.com" required style="
                            width: 100%;
                            padding: 12px;
                            border: 1px solid #d1d5db;
                            border-radius: 8px;
                            font-size: 1rem;
                        ">
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">ชื่อ-นามสกุล (Full Name)</label>
                        <input type="text" id="regName" placeholder="ชื่อ นามสกุล" required style="
                            width: 100%;
                            padding: 12px;
                            border: 1px solid #d1d5db;
                            border-radius: 8px;
                            font-size: 1rem;
                        ">
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">รหัสผ่าน (Password)</label>
                        <input type="password" id="regPassword" placeholder="อย่างน้อย 8 ตัวอักษร (A-Z, 0-9)" required minlength="8" autocomplete="new-password" style="
                            width: 100%;
                            padding: 12px;
                            border: 1px solid #d1d5db;
                            border-radius: 8px;
                            font-size: 1rem;
                        ">
                        <div id="passwordStrength" style="margin-top: 6px; font-size: 0.8rem; display: none;">
                            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                                <span id="pwRule1" style="color: #9ca3af;">✗ 8 ตัวขึ้นไป</span>
                                <span id="pwRule2" style="color: #9ca3af;">✗ ตัวพิมพ์ใหญ่ (A-Z)</span>
                                <span id="pwRule3" style="color: #9ca3af;">✗ ตัวเลข (0-9)</span>
                            </div>
                        </div>
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">ยืนยันรหัสผ่าน (Confirm Password)</label>
                        <input type="password" id="regConfirmPassword" placeholder="ยืนยันรหัสผ่าน" required autocomplete="new-password" style="
                            width: 100%;
                            padding: 12px;
                            border: 1px solid #d1d5db;
                            border-radius: 8px;
                            font-size: 1rem;
                        ">
                    </div>
                    <!-- v9.0: Branch selector -->
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">สาขา (Branch)</label>
                        <select id="regBranch" required style="
                            width: 100%;
                            padding: 12px;
                            border: 1px solid #d1d5db;
                            border-radius: 8px;
                            font-size: 1rem;
                            background: white;
                        ">
                            <option value="">กำลังโหลดสาขา...</option>
                        </select>
                    </div>
                    <div id="registerError" style="
                        background: #fee2e2;
                        color: #dc2626;
                        padding: 10px;
                        border-radius: 8px;
                        margin-bottom: 15px;
                        display: none;
                        font-size: 0.9rem;
                    "></div>
                    <div id="registerSuccess" style="
                        background: #d1fae5;
                        color: #059669;
                        padding: 10px;
                        border-radius: 8px;
                        margin-bottom: 15px;
                        display: none;
                        font-size: 0.9rem;
                    "></div>
                    <div style="display: flex; gap: 10px;">
                        <button type="button" id="cancelRegisterBtn" style="
                            flex: 1;
                            padding: 12px;
                            background: #e5e7eb;
                            color: #374151;
                            border: none;
                            border-radius: 8px;
                            font-size: 1rem;
                            cursor: pointer;
                        ">ยกเลิก</button>
                        <button type="submit" style="
                            flex: 1;
                            padding: 12px;
                            background: #2563eb;
                            color: white;
                            border: none;
                            border-radius: 8px;
                            font-size: 1rem;
                            font-weight: 600;
                            cursor: pointer;
                        ">สมัคร</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="login-footer">
            <p>© 2026 EWP Service Center</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.95.3" integrity="sha384-aRAaCbKYByQpx0fjPuC0PQ9P9moWMEsHXP9tyzP7tbyD5fPK6oTp+THsxdWiq02L" crossorigin="anonymous"></script>
    <script>
        // Environment switching - same as supabase-config.js
        const SUPABASE_ENVIRONMENTS = {
            production: {
                url: 'https://pyyltrcqeyfhidpcdtvc.supabase.co',
                anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5eWx0cmNxZXlmaGlkcGNkdHZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyMjE0MzcsImV4cCI6MjA4NTc5NzQzN30.vRJk8x6Kmo2rFYrJ6ZGqPWf3LSjLmb41COLJAP5glYo',
                label: 'Production'
            },
            sit: {
                url: 'https://cctzbereqvuaunweuqho.supabase.co',
                anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjdHpiZXJlcXZ1YXVud2V1cWhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2ODg0MDAsImV4cCI6MjA4NjI2NDQwMH0.jUEWda9uWtsJPak73fqvRZKnk6Qi2ciYNio3B3ex5Yo',
                label: 'SIT (Testing)'
            }
        };

        function detectEnvironment() {
            const urlParams = new URLSearchParams(window.location.search);
            const envParam = urlParams.get('env');
            if (envParam && SUPABASE_ENVIRONMENTS[envParam]) return envParam;
            // Auto-detect from Cloudflare Pages SIT hostname
            const hostname = window.location.hostname;
            if (hostname.includes('sit.pages.dev') || hostname.includes('-sit.pages.dev')) return 'sit';
            return 'production';
        }

        const CURRENT_ENV = detectEnvironment();
        const SUPABASE_URL = SUPABASE_ENVIRONMENTS[CURRENT_ENV].url;
        const SUPABASE_ANON_KEY = SUPABASE_ENVIRONMENTS[CURRENT_ENV].anonKey;

        // Store env for redirect
        window.SUPABASE_LOGIN_ENV = CURRENT_ENV;

        function initSupabase() {
            if (window.supabase && window.supabase.createClient) {
                window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log(`✅ Supabase initialized [${SUPABASE_ENVIRONMENTS[CURRENT_ENV].label}]`);
                return true;
            }
            return false;
        }

        if (!initSupabase()) {
            setTimeout(initSupabase, 100);
        }
    </script>
    <script src="js/auth.js"></script>
    <script>
        // Registration Modal Handlers
        // v9.0: Load branches for registration dropdown
        function escAttr(str) {
            if (!str) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        async function loadBranchesForRegister() {
            try {
                if (!window.supabaseClient) return;
                const { data, error } = await window.supabaseClient
                    .from('branches')
                    .select('id, code, name_th')
                    .eq('is_active', true)
                    .order('display_order', { ascending: true })
                    .order('name_th', { ascending: true });

                if (error) throw error;

                const select = document.getElementById('regBranch');
                if (select && data) {
                    select.innerHTML = '<option value="">-- เลือกสาขา --</option>' +
                        data.map(b => `<option value="${escAttr(b.id)}">${escAttr(b.name_th)} (${escAttr(b.code)})</option>`).join('');
                }
            } catch (e) {
                console.warn('Could not load branches:', e);
                const select = document.getElementById('regBranch');
                if (select) select.innerHTML = '<option value="">ไม่สามารถโหลดสาขาได้</option>';
            }
        }
        // Load branches after supabase is ready
        setTimeout(loadBranchesForRegister, 500);

        document.getElementById('showRegisterBtn').addEventListener('click', function() {
            document.getElementById('registerModal').style.display = 'flex';
            loadBranchesForRegister(); // Reload in case first attempt failed
        });

        document.getElementById('cancelRegisterBtn').addEventListener('click', function() {
            document.getElementById('registerModal').style.display = 'none';
            document.getElementById('registerForm').reset();
            document.getElementById('registerError').style.display = 'none';
            document.getElementById('registerSuccess').style.display = 'none';
        });

        document.getElementById('registerModal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.style.display = 'none';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('regEmail').value;
            const name = document.getElementById('regName').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const errorEl = document.getElementById('registerError');
            const successEl = document.getElementById('registerSuccess');
            const submitBtn = this.querySelector('button[type="submit"]');

            // Reset messages
            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            // Validate password complexity (client-side)
            if (password.length < 8) {
                errorEl.textContent = 'รหัสผ่านต้องมีอย่างน้อย 8 ตัวอักษร';
                errorEl.style.display = 'block';
                return;
            }
            if (!/[A-Z]/.test(password)) {
                errorEl.textContent = 'รหัสผ่านต้องมีตัวพิมพ์ใหญ่ (A-Z) อย่างน้อย 1 ตัว';
                errorEl.style.display = 'block';
                return;
            }
            if (!/[0-9]/.test(password)) {
                errorEl.textContent = 'รหัสผ่านต้องมีตัวเลข (0-9) อย่างน้อย 1 ตัว';
                errorEl.style.display = 'block';
                return;
            }

            // Validate passwords match
            if (password !== confirmPassword) {
                errorEl.textContent = 'รหัสผ่านไม่ตรงกัน';
                errorEl.style.display = 'block';
                return;
            }

            // v9.0: Validate branch selection
            const branchId = document.getElementById('regBranch')?.value;
            if (!branchId) {
                errorEl.textContent = 'กรุณาเลือกสาขา';
                errorEl.style.display = 'block';
                return;
            }

            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'กำลังสมัคร...';

            // Wait for AuthSystem to be available
            if (!window.AuthSystem || !window.AuthSystem.registerUser) {
                errorEl.textContent = 'ระบบไม่พร้อม กรุณารอสักครู่แล้วลองใหม่';
                errorEl.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'สมัคร';
                return;
            }

            const result = await window.AuthSystem.registerUser(email, password, name, branchId);

            if (result.success) {
                successEl.textContent = result.message;
                successEl.style.display = 'block';
                document.getElementById('registerForm').reset();

                // Close modal after 3 seconds
                setTimeout(() => {
                    document.getElementById('registerModal').style.display = 'none';
                    successEl.style.display = 'none';
                }, 3000);
            } else {
                errorEl.textContent = result.error;
                errorEl.style.display = 'block';
            }

            submitBtn.disabled = false;
            submitBtn.textContent = 'สมัคร';
        });

        // Realtime password strength indicator
        document.getElementById('regPassword').addEventListener('input', function() {
            const pw = this.value;
            const indicator = document.getElementById('passwordStrength');
            const r1 = document.getElementById('pwRule1');
            const r2 = document.getElementById('pwRule2');
            const r3 = document.getElementById('pwRule3');

            indicator.style.display = pw.length > 0 ? 'block' : 'none';

            const pass1 = pw.length >= 8;
            const pass2 = /[A-Z]/.test(pw);
            const pass3 = /[0-9]/.test(pw);

            r1.textContent = (pass1 ? '✓' : '✗') + ' 8 ตัวขึ้นไป';
            r1.style.color = pass1 ? '#059669' : '#dc2626';
            r2.textContent = (pass2 ? '✓' : '✗') + ' ตัวพิมพ์ใหญ่ (A-Z)';
            r2.style.color = pass2 ? '#059669' : '#dc2626';
            r3.textContent = (pass3 ? '✓' : '✗') + ' ตัวเลข (0-9)';
            r3.style.color = pass3 ? '#059669' : '#dc2626';
        });
    </script>
</body>
</html>
