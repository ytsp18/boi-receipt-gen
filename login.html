<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co; img-src 'self' data: blob: https://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'">
    <title>เข้าสู่ระบบ - ระบบสร้างแบบฟอร์มรับบัตร EWP</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #2563eb;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #6b7280;
            font-size: 0.9rem;
        }

        .login-form .form-group {
            margin-bottom: 20px;
        }

        .login-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
        }

        .login-form input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .login-form input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: #1d4ed8;
        }

        .login-error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            color: #9ca3af;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🔐 เข้าสู่ระบบ</h1>
            <p>ระบบสร้างแบบฟอร์มการรับบัตร BOI</p>
            <p style="font-size: 0.8rem; margin-top: 4px;">ศูนย์บริการ EWP</p>
        </div>

        <div class="login-error" id="loginError">
            ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง
        </div>

        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label for="email">อีเมล (Email)</label>
                <input type="email" id="email" placeholder="กรอกอีเมล" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">รหัสผ่าน (Password)</label>
                <input type="password" id="password" placeholder="กรอกรหัสผ่าน" required autocomplete="current-password">
            </div>

            <button type="submit" class="login-btn">เข้าสู่ระบบ</button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <p style="color: #6b7280; font-size: 0.9rem;">ยังไม่มีบัญชี?</p>
            <button type="button" class="register-btn" id="showRegisterBtn" style="
                background: transparent;
                border: 2px solid #2563eb;
                color: #2563eb;
                padding: 10px 20px;
                border-radius: 8px;
                font-size: 0.9rem;
                font-weight: 500;
                cursor: pointer;
                margin-top: 8px;
                transition: all 0.2s;
            ">📝 สมัครใช้งาน</button>
        </div>

        <!-- Register Modal -->
        <div id="registerModal" style="
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        ">
            <div style="
                background: white;
                padding: 30px;
                border-radius: 16px;
                width: 100%;
                max-width: 400px;
                margin: 20px;
            ">
                <h2 style="text-align: center; color: #2563eb; margin-bottom: 20px;">📝 สมัครใช้งาน</h2>
                <form id="registerForm">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">อีเมล (Email)</label>
                        <input type="email" id="regEmail" placeholder="example@email.com" required style="
                            width: 100%;
                            padding: 12px;
                            border: 1px solid #d1d5db;
                            border-radius: 8px;
                            font-size: 1rem;
                        ">
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">ชื่อ-นามสกุล (Full Name)</label>
                        <input type="text" id="regName" placeholder="ชื่อ นามสกุล" required style="
                            width: 100%;
                            padding: 12px;
                            border: 1px solid #d1d5db;
                            border-radius: 8px;
                            font-size: 1rem;
                        ">
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">รหัสผ่าน (Password)</label>
                        <input type="password" id="regPassword" placeholder="อย่างน้อย 8 ตัวอักษร (A-Z, 0-9)" required minlength="8" autocomplete="new-password" style="
                            width: 100%;
                            padding: 12px;
                            border: 1px solid #d1d5db;
                            border-radius: 8px;
                            font-size: 1rem;
                        ">
                        <div id="passwordStrength" style="margin-top: 6px; font-size: 0.8rem; display: none;">
                            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                                <span id="pwRule1" style="color: #9ca3af;">✗ 8 ตัวขึ้นไป</span>
                                <span id="pwRule2" style="color: #9ca3af;">✗ ตัวพิมพ์ใหญ่ (A-Z)</span>
                                <span id="pwRule3" style="color: #9ca3af;">✗ ตัวเลข (0-9)</span>
                            </div>
                        </div>
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">ยืนยันรหัสผ่าน (Confirm Password)</label>
                        <input type="password" id="regConfirmPassword" placeholder="ยืนยันรหัสผ่าน" required autocomplete="new-password" style="
                            width: 100%;
                            padding: 12px;
                            border: 1px solid #d1d5db;
                            border-radius: 8px;
                            font-size: 1rem;
                        ">
                    </div>
                    <!-- v9.0: Branch selector -->
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">สาขา (Branch)</label>
                        <select id="regBranch" required style="
                            width: 100%;
                            padding: 12px;
                            border: 1px solid #d1d5db;
                            border-radius: 8px;
                            font-size: 1rem;
                            background: white;
                        ">
                            <option value="">กำลังโหลดสาขา...</option>
                        </select>
                    </div>
                    <div id="registerError" style="
                        background: #fee2e2;
                        color: #dc2626;
                        padding: 10px;
                        border-radius: 8px;
                        margin-bottom: 15px;
                        display: none;
                        font-size: 0.9rem;
                    "></div>
                    <div id="registerSuccess" style="
                        background: #d1fae5;
                        color: #059669;
                        padding: 10px;
                        border-radius: 8px;
                        margin-bottom: 15px;
                        display: none;
                        font-size: 0.9rem;
                    "></div>
                    <div style="display: flex; gap: 10px;">
                        <button type="button" id="cancelRegisterBtn" style="
                            flex: 1;
                            padding: 12px;
                            background: #e5e7eb;
                            color: #374151;
                            border: none;
                            border-radius: 8px;
                            font-size: 1rem;
                            cursor: pointer;
                        ">ยกเลิก</button>
                        <button type="submit" style="
                            flex: 1;
                            padding: 12px;
                            background: #2563eb;
                            color: white;
                            border: none;
                            border-radius: 8px;
                            font-size: 1rem;
                            font-weight: 600;
                            cursor: pointer;
                        ">สมัคร</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="login-footer">
            <p>© 2026 EWP Service Center</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.95.3" integrity="sha384-aRAaCbKYByQpx0fjPuC0PQ9P9moWMEsHXP9tyzP7tbyD5fPK6oTp+THsxdWiq02L" crossorigin="anonymous"></script>
    <script src="js/supabase-config.js?v=9.3.0"></script>
    <script src="js/auth.js?v=9.3.0"></script>
    <script src="js/login-register.js?v=9.3.0"></script>
</body>
</html>
